name: Deploy to Render

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Test (if tests exist)
      run: dotnet test --configuration Release --no-build --verbosity normal || true
    
    - name: Publish
      run: dotnet publish Sparkle.Api/Sparkle.Api.csproj --configuration Release --output ./publish
    
    - name: Deploy to Render
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      env:
        RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      run: |
        if [ -n "$RENDER_DEPLOY_HOOK" ]; then
          curl "$RENDER_DEPLOY_HOOK"
          echo "Deployment triggered on Render"
        else
          echo "RENDER_DEPLOY_HOOK not configured. Set it in GitHub Secrets."
        fi

  build-docker:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t sparkle-api:latest .
    
    - name: Check image
      run: docker images sparkle-api
