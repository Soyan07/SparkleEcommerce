services:
  - type: web
    name: sparkle-ecommerce
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:5000
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: JWT__Key
        generateValue: true
      - key: JWT__Issuer
        value: Sparkle
      - key: JWT__Audience
        value: SparkleClient
      - key: Google__ClientId
        sync: false
      - key: Google__ClientSecret
        sync: false
