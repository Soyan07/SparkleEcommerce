version: '3.8'

services:
  sparkle-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sparkle-api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db45876.databaseasp.net,1433;Database=SparkleEcommerce;User Id=db45876;Password=22103379;TrustServerCertificate=True;MultipleActiveResultSets=true;Encrypt=False
      - ASPNETCORE_URLS=http://+:5000
      - JWT__Key=Sparkle_Secure_JWT_Key_Must_Be_At_Least_32_Characters_Long_2024!
      - JWT__Issuer=Sparkle
      - JWT__Audience=SparkleClient
    networks:
      - sparkle-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  sparkle-network:
    driver: bridge
